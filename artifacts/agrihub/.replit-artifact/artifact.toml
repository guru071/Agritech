kind = "web"
previewPath = "/"
title = "AgriHub Pro"
version = "1.0.0"
id = "artifacts/agrihub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21713

[services.development]
run = "pnpm --filter @workspace/agrihub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agrihub", "run", "build" ]
publicDir = "artifacts/agrihub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21713"
BASE_PATH = "/"
